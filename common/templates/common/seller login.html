{% extends 'common/master_common.html' %}
{% block content %}
<main class="min-h-screen flex items-center justify-center p-6 bg-[#fcfdfc]">
    <div class="w-full max-w-[500px] bg-white p-12 lg:p-16 rounded-[3rem] shadow-2xl border border-slate-50 text-center">
        <div class="w-16 h-16 bg-[#1e1b4b] rounded-2xl flex items-center justify-center text-white mx-auto mb-8 shadow-lg">
            <i class="bi bi-shop-window text-2xl"></i>
        </div>
        
        <h1 class="serif-title text-3xl text-slate-900 mb-2">Merchant Login</h1>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[3px] mb-10">Access your KitabHub Dashboard</p>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-xl {% if message.tags == 'error' %}bg-red-50 text-red-600{% else %}bg-indigo-50 text-indigo-700{% endif %} text-[9px] font-bold uppercase tracking-widest">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Merchant Email" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-indigo-500 text-sm">
            <input type="password" name="password" placeholder="Password" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:border-indigo-500 text-sm">
            
            <button type="submit" class="w-full bg-[#1e1b4b] text-white py-5 rounded-2xl text-[11px] font-bold uppercase tracking-[4px] hover:bg-indigo-900 transition-all mt-4">
                Authenticate Portal
            </button>
        </form>

        <a href="{% url 'common:seller_signup' %}" class="inline-block mt-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 hover:text-indigo-600 transition-all pb-1">Apply for Merchant Access</a>
    </div>
</main>
{% endblock %}
