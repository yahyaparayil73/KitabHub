{% extends 'customer/master_customer.html' %}
{% load static %}

{% block title %}
<title>Secure Access | Change Password</title>
{% endblock %}

{% block content %}
<style>
    .vault-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(6, 78, 59, 0.05);
        box-shadow: 0 25px 50px -12px rgba(6, 78, 59, 0.1);
    }
    
    .input-group-custom {
        transition: all 0.3s ease;
        border-bottom: 2px solid #f1f5f9;
    }
    
    .input-group-custom:focus-within {
        border-bottom-color: #10b981;
    }

    .floating-label-input:focus + label,
    .floating-label-input:not(:placeholder-shown) + label {
        transform: translateY(-1.5rem) scale(0.8);
        color: #10b981;
    }

    .form-label-fancy {
        transition: all 0.3s ease;
        pointer-events: none;
    }
</style>

<div class="min-h-[80vh] flex items-center justify-center px-8 py-20 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-96 h-96 bg-emerald-50 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-green-50 rounded-full blur-[100px] translate-x-1/2 translate-y-1/2"></div>

    <div class="vault-card w-full max-w-xl rounded-[3.5rem] p-12 lg:p-16 relative z-10">
        <div class="text-center mb-12">
            <div class="w-16 h-16 bg-[#064e3b] text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl rotate-3">
                <i class="bi bi-shield-lock text-2xl"></i>
            </div>
            <h1 class="serif-title text-4xl text-slate-900 mb-3">Secure Your Archive</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-[3px]">Update your credentials below</p>
        </div>

        {% if message %}
        <div class="mb-8 p-4 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center gap-3 animate-pulse">
            <i class="bi bi-info-circle text-emerald-600"></i>
            <p class="text-emerald-800 text-[11px] font-bold uppercase tracking-wider">{{ message }}</p>
        </div>
        {% endif %}

        <form method="POST" id="form_id" class="space-y-10">
            {% csrf_token %}
            
            <div class="relative input-group-custom">
                <input type="password" 
                       id="old_password_Field" 
                       name="old_password" 
                       placeholder=" " 
                       class="floating-label-input w-full bg-transparent py-4 outline-none text-slate-800 font-medium placeholder-transparent">
                <label for="old_password_Field" class="form-label-fancy absolute left-0 top-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Current Password</label>
                <i class="bi bi-key absolute right-0 top-4 text-slate-300"></i>
            </div>

            <div class="relative input-group-custom">
                <input type="password" 
                       id="new_password_Field" 
                       name="new_password" 
                       placeholder=" " 
                       class="floating-label-input w-full bg-transparent py-4 outline-none text-slate-800 font-medium placeholder-transparent">
                <label for="new_password_Field" class="form-label-fancy absolute left-0 top-4 text-slate-400 text-xs font-bold uppercase tracking-widest">New Secret Phrase</label>
                <i class="bi bi-lock absolute right-0 top-4 text-slate-300"></i>
            </div>

            <div class="relative input-group-custom">
                <input type="password" 
                       id="confirm_password_Field" 
                       name="confirm_password" 
                       placeholder=" " 
                       class="floating-label-input w-full bg-transparent py-4 outline-none text-slate-800 font-medium placeholder-transparent">
                <label for="confirm_password_Field" class="form-label-fancy absolute left-0 top-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Verify New Password</label>
                <i class="bi bi-check2-circle absolute right-0 top-4 text-slate-300"></i>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full bg-[#064e3b] text-white py-6 rounded-2xl font-bold text-[10px] uppercase tracking-[4px] shadow-2xl hover:bg-black hover:-translate-y-1 transition-all duration-300">
                    Update Security Vault
                </button>
                
                <div class="mt-8 text-center">
                    <a href="{% url 'customer:home' %}" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-emerald-600 transition-colors">
                        <i class="bi bi-arrow-left mr-2"></i> Return to Library
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    // Subtle focus animations
    const inputs = document.querySelectorAll('.floating-label-input');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.classList.add('border-emerald-500');
        });
        input.addEventListener('blur', () => {
            input.parentElement.classList.remove('border-emerald-500');
        });
    });
</script>
{% endblock %}
